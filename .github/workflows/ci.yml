name: Mộc Craft Full-Stack CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: 'backend/package-lock.json'

      - name: Install Backend Dependencies
        run: |
          cd backend
          npm ci

      - name: Generate Prisma Client
        run: |
          cd backend
          npx prisma generate
        env:
          DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/test?schema=public"

      - name: Run Backend Unit Tests
        run: |
          cd backend
          npm test
        env:
          DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/test?schema=public"
          STRIPE_TEST_SECRET_KEY: "sk_test_MockSecret"
          PORT: 5050
          NODE_ENV: test

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Install Frontend Dependencies
        run: |
          cd frontend
          npm ci

      - name: Build Next.js Application
        run: |
          cd frontend
          npm run build
        env:
          NEXT_PUBLIC_API_URL: "http://localhost:5050/api"
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: "pk_test_MockPublishable"
